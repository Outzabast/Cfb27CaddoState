services:
  db:
    image: postgres:18.4-trixie
    container_name: caddo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Postgres 18's default PGDATA is /var/lib/postgresql/18/docker (NOT the old
      # /var/lib/postgresql/data). We bind-mount the cluster straight into ./pg-data
      # so the actual database files live in the repo and can be committed.
      - ./pg-data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
